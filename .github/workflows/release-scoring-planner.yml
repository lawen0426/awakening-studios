name: Release Scoring Planner

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Scoring-Planner/**'
      - '.github/workflows/release-scoring-planner.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app directory
        id: app-dir
        run: |
          if [ -f Scoring-Planner/package.json ]; then
            echo "dir=Scoring-Planner" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Read version
        id: version
        working-directory: ${{ steps.app-dir.outputs.dir }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.app-dir.outputs.dir }}
        run: npm ci

      - name: Build and package macOS app
        working-directory: ${{ steps.app-dir.outputs.dir }}
        run: npm run pack:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_SUPABASE_URL: https://thrqknbbrvkzsawjmhei.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_sGbKklWhqJ6RMKjfO4eqcA_jCdI_iRl

      - name: Normalize release asset names
        working-directory: ${{ steps.app-dir.outputs.dir }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd release
          cp "Film Scoring Weekly Planner-${VERSION}-arm64-mac.zip" "Film-Scoring-Weekly-Planner-${VERSION}-arm64-mac.zip"
          cp "Film Scoring Weekly Planner-${VERSION}-arm64-mac.zip.blockmap" "Film-Scoring-Weekly-Planner-${VERSION}-arm64-mac.zip.blockmap"
          cp "Film Scoring Weekly Planner-${VERSION}-arm64.dmg" "Film-Scoring-Weekly-Planner-${VERSION}-arm64.dmg"
          cp "Film Scoring Weekly Planner-${VERSION}-arm64.dmg.blockmap" "Film-Scoring-Weekly-Planner-${VERSION}-arm64.dmg.blockmap"
          rm -f "Film Scoring Weekly Planner-${VERSION}-arm64-mac.zip" \
            "Film Scoring Weekly Planner-${VERSION}-arm64-mac.zip.blockmap" \
            "Film Scoring Weekly Planner-${VERSION}-arm64.dmg" \
            "Film Scoring Weekly Planner-${VERSION}-arm64.dmg.blockmap"
          ls -la

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Scoring Planner ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.app-dir.outputs.dir }}/release/Film-Scoring-Weekly-Planner-${{ steps.version.outputs.version }}-arm64.dmg
            ${{ steps.app-dir.outputs.dir }}/release/Film-Scoring-Weekly-Planner-${{ steps.version.outputs.version }}-arm64.dmg.blockmap
            ${{ steps.app-dir.outputs.dir }}/release/Film-Scoring-Weekly-Planner-${{ steps.version.outputs.version }}-arm64-mac.zip
            ${{ steps.app-dir.outputs.dir }}/release/Film-Scoring-Weekly-Planner-${{ steps.version.outputs.version }}-arm64-mac.zip.blockmap
            ${{ steps.app-dir.outputs.dir }}/release/latest-mac.yml
